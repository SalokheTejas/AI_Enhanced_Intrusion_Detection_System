<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Enhanced Intrusion Detection</title>

    <!-- Professional modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #111827;
            --card: rgba(17, 24, 39, 0.88);
            --card-border: rgba(255, 255, 255, 0.10);
            --text: #e5e7eb;
            --muted: #94a3b8;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --accent: #14b8a6;
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.14);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.25), transparent 30%),
                radial-gradient(circle at top right, rgba(20, 184, 166, 0.18), transparent 28%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .wrapper {
            width: 100%;
            max-width: 560px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            padding: 32px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-block;
            padding: 7px 14px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.16);
            color: #bfdbfe;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            margin-bottom: 14px;
        }

        h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #ffffff;
        }

        .subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 0.96rem;
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 16px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 0.92rem;
            font-weight: 500;
            color: #dbe4f0;
        }

        input[type="number"],
        input[type="text"] {
            width: 100%;
            padding: 13px 14px;
            border-radius: 12px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            font-size: 0.98rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        input::placeholder {
            color: #64748b;
        }

        input[type="number"]:focus,
        input[type="text"]:focus {
            border-color: rgba(37, 99, 235, 0.85);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.16);
            transform: translateY(-1px);
        }

        input[type="submit"] {
            margin-top: 8px;
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(37, 99, 235, 0.32);
            filter: brightness(1.03);
        }

        input[type="submit"]:active {
            transform: translateY(0);
        }

        .prediction {
            margin-top: 22px;
            padding: 18px 16px;
            border-radius: 14px;
            background: rgba(20, 184, 166, 0.12);
            border: 1px solid rgba(20, 184, 166, 0.22);
            text-align: center;
        }

        .prediction h3 {
            margin: 0;
            color: #d1fae5;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .footer-note {
            margin-top: 14px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
        }

        @media (max-width: 640px) {
            .card {
                padding: 22px;
                border-radius: 18px;
            }

            h2 {
                font-size: 1.45rem;
            }

            .subtitle {
                font-size: 0.92rem;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="header">
                <div class="badge">AI Security Dashboard</div>
                <h2>AI-Enhanced Intrusion Detection</h2>
                <p class="subtitle">Enter network flow details below to generate a prediction with a modern, secure interface.</p>
            </div>

            <form method="POST" action="/predict">
                <div class="field">
                    <label for="flow_duration">Flow Duration</label>
                    <input type="number" step="any" id="flow_duration" name="flow_duration" placeholder="Enter flow duration" required>
                </div>

                <div class="field">
                    <label for="total_fwd_packets">Total Fwd Packets</label>
                    <input type="number" step="any" id="total_fwd_packets" name="total_fwd_packets" placeholder="Enter total forward packets" required>
                </div>

                <div class="field">
                    <label for="total_backward_packets">Total Backward Packets</label>
                    <input type="number" step="any" id="total_backward_packets" name="total_backward_packets" placeholder="Enter total backward packets" required>
                </div>

                <div class="field">
                    <label for="total_length_fwd_packets">Total Length of Fwd Packets</label>
                    <input type="number" step="any" id="total_length_fwd_packets" name="total_length_fwd_packets" placeholder="Enter total forward packet length" required>
                </div>

                <input type="submit" value="Predict">
            </form>

            {% if prediction %}
                <div class="prediction">
                    <h3>Prediction: {{ prediction }}</h3>
                </div>
            {% endif %}

            <div class="footer-note">Professional UI • Clean layout • Responsive design</div>
        </div>
    </div>
</body>
</html>
